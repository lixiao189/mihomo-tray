# mihomo-tray default config
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
# API is exposed via a local socket by the tray (-ext-ctl-unix / -ext-ctl-pipe).
# Optional HTTP controller for external tools (yacd, etc.):
# external-controller: 127.0.0.1:9090
secret: ""

dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - 8.8.8.8
    - 1.1.1.1

proxies: []

proxy-groups: []

rules:
  - MATCH,DIRECT
