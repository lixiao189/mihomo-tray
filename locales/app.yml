dialog.service_install_title:
  en: Install Privileged Service
  zh-CN: 安装特权服务

dialog.service_install_body:
  en: TUN mode needs a one-time privileged helper. After installation, enabling TUN and quitting will not ask for your password again.
  zh-CN: TUN 模式需要一次性安装特权服务。安装后，开关 TUN 与退出应用都不再需要输入密码。

dialog.service_install_prompt:
  en: mihomo-tray needs administrator privileges to install its helper service.
  zh-CN: mihomo-tray 需要管理员权限以安装辅助服务。

dialog.service_uninstall_title:
  en: Uninstall Privileged Service
  zh-CN: 卸载特权服务

dialog.service_uninstall_body:
  en: This removes the LaunchDaemon helper. TUN mode will be unavailable until you install the service again.
  zh-CN: 将移除系统 LaunchDaemon 辅助服务。卸载后需重新安装才能使用 TUN 模式。

dialog.service_uninstall_prompt:
  en: mihomo-tray needs administrator privileges to uninstall its helper service.
  zh-CN: mihomo-tray 需要管理员权限以卸载辅助服务。

